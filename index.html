<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AutoParts - Умный подбор запчастей</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.1);
        }

        /* Vehicle Form */
        .vehicle-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* Saved Vehicles */
        .saved-vehicles {
            margin-top: 30px;
        }

        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .vehicle-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .vehicle-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .vehicle-item.active {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .vehicle-info h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .vehicle-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .delete-vehicle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: var(--error);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .vehicle-item:hover .delete-vehicle {
            opacity: 1;
        }

        .delete-vehicle:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Chat Interface */
        .chat-container {
            margin-top: 30px;
        }

        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-user .message-content {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            padding: 14px 20px;
            border-radius: 18px 18px 4px 18px;
            max-width: 70%;
        }

        .message-ai {
            display: flex;
            justify-content: flex-start;
        }

        .message-ai .message-content {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 18px 18px 18px 4px;
            max-width: 70%;
            border: 1px solid var(--glass-border);
        }

        .message-content strong {
            color: var(--accent);
        }

        .message-content ul {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 5px 0;
        }

        .part-number {
            background: rgba(99, 102, 241, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .chat-input-container {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 16px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
            color: var(--success);
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .status-error .status-dot {
            background: var(--error);
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .vehicle-form {
                grid-template-columns: 1fr;
            }

            .chat-messages {
                height: 400px;
            }

            .message-content {
                max-width: 85%;
            }
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 AI AutoParts</h1>
            <p class="subtitle">Умный подбор автозапчастей с искусственным интеллектом</p>
        </header>

        <!-- Connection Status -->
        <div id="connectionStatus" class="status-indicator">
            <div class="status-dot"></div>
            <span>Проверка подключения к ИИ...</span>
        </div>

        <!-- Vehicle Selection Form -->
        <div class="glass-card">
            <h2 style="margin-bottom: 20px; font-size: 1.5rem;">📋 Данные автомобиля</h2>
            <form id="vehicleForm" class="vehicle-form">
                <div class="form-group">
                    <label for="vin">VIN номер *</label>
                    <input 
                        type="text" 
                        id="vin" 
                        placeholder="Введите 17 символов VIN" 
                        maxlength="17"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="year">Год выпуска *</label>
                    <select id="year" required>
                        <option value="">Выберите год</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="engine">Объём двигателя (л)</label>
                    <input 
                        type="text" 
                        id="engine" 
                        placeholder="Например: 2.0"
                    >
                </div>
            </form>
            <div class="button-group">
                <button type="button" id="detectBtn" class="btn btn-primary">
                    🔍 Определить автомобиль
                </button>
                <button type="button" id="saveVehicleBtn" class="btn btn-secondary" disabled>
                    💾 Сохранить автомобиль
                </button>
            </div>

            <!-- Saved Vehicles -->
            <div class="saved-vehicles">
                <h3 style="margin-top: 30px; font-size: 1.2rem;">💼 Мои автомобили</h3>
                <div id="vehiclesGrid" class="vehicles-grid">
                    <p style="color: var(--text-secondary); grid-column: 1/-1;">Нет сохранённых автомобилей</p>
                </div>
            </div>
        </div>

        <!-- Current Vehicle Info -->
        <div id="currentVehicleInfo" class="glass-card hidden fade-in">
            <h2 style="margin-bottom: 15px; font-size: 1.3rem;">✅ Выбранный автомобиль</h2>
            <div id="vehicleDetails"></div>
        </div>

        <!-- Chat Interface -->
        <div id="chatContainer" class="glass-card chat-container hidden fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.3rem;">💬 Чат с ИИ агентом</h2>
                <button id="clearChatBtn" class="btn btn-danger">
                    🗑️ Очистить чат
                </button>
            </div>
            
            <div id="chatMessages" class="chat-messages">
                <!-- Messages will be added here -->
            </div>
            
            <div class="chat-input-container">
                <input 
                    type="text" 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Какая запчасть вас интересует? Например: стойка стабилизатора..."
                    disabled
                >
                <button id="sendBtn" class="btn btn-primary" disabled>
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { OpenRouter } from "https://cdn.jsdelivr.net/npm/@openrouter/sdk@+latest/+esm";

        // Configuration
        const API_KEY = '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';
        // Список моделей: бесплатные, с доступом в интернет (или свежими данными), хорошие в логике
        const MODELS = [
            "google/gemini-2.0-flash-exp:free", // Экспериментальная, очень быстрая и умная, есть поиск
            "google/gemini-pro-1.5:free",      // Стабильная версия с большим контекстом
            "mistralai/mistral-large-2411:free", // Отличная логика
            "qwen/qwen-2.5-coder-32b-instruct:free", // Хороша в коде и структурированных данных
            "meta-llama/llama-3.3-70b-instruct:free" // Мощная логическая модель
        ];
        let currentModelIndex = 0;

        // Initialize OpenRouter
        const openrouter = new OpenRouter({
            apiKey: API_KEY,
            headers: {
                'HTTP-Referer': window.location.origin,
                'X-Title': 'AI AutoParts Selector'
            }
        });

        // Helper function to get AI response with model fallback
        async function getAIResponse(messages, useStream = false) {
            let lastError = null;
            
            for (let i = 0; i < MODELS.length; i++) {
                const modelIndex = (currentModelIndex + i) % MODELS.length;
                const currentModel = MODELS[modelIndex];
                
                try {
                    const response = await openrouter.chat.send({
                        model: currentModel,
                        messages: messages,
                        stream: useStream
                    });
                    currentModelIndex = modelIndex;
                    return response;
                } catch (modelError) {
                    lastError = modelError;
                    console.warn(`Модель ${currentModel} не ответила:`, modelError.message);
                    continue;
                }
            }
            
            throw new Error(`Ни одна модель не ответила. Последняя ошибка: ${lastError?.message || 'Неизвестная ошибка'}`);
        }

        // State
        let currentVehicle = null;
        let savedVehicles = JSON.parse(localStorage.getItem('savedVehicles') || '[]');
        let chatHistory = [];
        let isAITyping = false;

        // System prompt for AI agent
        const SYSTEM_PROMPT = `Ты - профессиональный ИИ-агент по подбору автозапчастей. Твоя задача:

1. Сначала определи автомобиль по VIN-коду, году выпуска и объёму двигателя.
   - VIN-код содержит 17 символов и включает информацию о производителе, модели, годе выпуска и других характеристиках.
   - Сопоставь VIN с годом выпуска для точной идентификации.
   - Определи марку, модель, поколение, тип кузова и двигатель автомобиля.

2. После определения автомобиля спроси пользователя, какая запчасть ему нужна.
   - Будь вежливым и профессиональным.
   - Задавай уточняющие вопросы при необходимости (например, передняя или задняя стойка, левая или правая сторона).

3. Когда пользователь указал запчасть:
   - Используй свои знания и доступ в интернет для поиска информации.
   - Найди ОРИГИНАЛЬНЫЙ номер запчасти (OEM number) для данного автомобиля.
   - Найди ПОДХОДЯЩИЕ АНАЛОГИ от других производителей (Aftermarket parts).
   - Укажи производителей аналогов (например: Bosch, Febi Bilstein, Lemforder, TRW, Delphi и т.д.).

4. Формат ответа:
   - Название запчасти
   - Оригинальный номер (OEM): [номер]
   - Подходящие аналоги:
     • [Производитель]: [номер]
     • [Производитель]: [номер]
   - Краткие рекомендации по выбору (если уместно)

5. Если информация недоступна или неточна:
   - Честно сообщи об этом пользователю.
   - Предложи альтернативные способы проверки (обратиться к дилеру, проверить по каталогу).

6. Всегда используй русский язык для общения.
7. Будь точным и проверяй информацию через поиск в интернете.
8. Для популярных запчастей (фильтры, колодки, свечи) можешь давать несколько вариантов на выбор.`;

        // DOM Elements
        const vinInput = document.getElementById('vin');
        const yearSelect = document.getElementById('year');
        const engineInput = document.getElementById('engine');
        const detectBtn = document.getElementById('detectBtn');
        const saveVehicleBtn = document.getElementById('saveVehicleBtn');
        const vehiclesGrid = document.getElementById('vehiclesGrid');
        const currentVehicleInfo = document.getElementById('currentVehicleInfo');
        const vehicleDetails = document.getElementById('vehicleDetails');
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const connectionStatus = document.getElementById('connectionStatus');

        // Initialize
        function init() {
            populateYearSelect();
            renderSavedVehicles();
            checkConnection();
            
            // Load saved vehicle if exists
            const lastActiveVehicle = localStorage.getItem('lastActiveVehicle');
            if (lastActiveVehicle) {
                const vehicle = savedVehicles.find(v => v.id === lastActiveVehicle);
                if (vehicle) {
                    selectVehicle(vehicle);
                }
            }
        }

        // Populate year select
        function populateYearSelect() {
            const currentYear = new Date().getFullYear();
            for (let year = currentYear + 1; year >= 1980; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            }
        }

        // Check AI connection
        async function checkConnection() {
            try {
                let response = null;
                let lastError = null;
                
                // Пробуем подключиться через доступные модели
                for (const model of MODELS) {
                    try {
                        response = await openrouter.chat.send({
                            model: model,
                            messages: [
                                {
                                    role: 'user',
                                    content: 'Ответь только "Да" если ты подключен и готов работать.'
                                }
                            ],
                            stream: false
                        });
                        // Если успешно, запоминаем модель и выходим
                        currentModelIndex = MODELS.indexOf(model);
                        break;
                    } catch (modelError) {
                        lastError = modelError;
                        console.warn(`Модель ${model} не ответила при проверке:`, modelError.message);
                        continue;
                    }
                }
                
                if (!response) {
                    throw new Error(`Ни одна модель не ответила. Последняя ошибка: ${lastError?.message || 'Неизвестная ошибка'}`);
                }

                const content = response.choices[0]?.message?.content || '';
                
                if (content.toLowerCase().includes('да') || content.length > 0) {
                    connectionStatus.innerHTML = `
                        <div class="status-dot"></div>
                        <span>✅ ИИ подключен и готов к работе (${MODELS[currentModelIndex]})</span>
                    `;
                    connectionStatus.classList.remove('status-error');
                } else {
                    throw new Error('Некорректный ответ от ИИ');
                }
            } catch (error) {
                console.error('Connection error:', error);
                connectionStatus.innerHTML = `
                    <div class="status-dot"></div>
                    <span>❌ Ошибка подключения: ${error.message}</span>
                `;
                connectionStatus.classList.add('status-error');
            }
        }

        // Detect vehicle using AI
        async function detectVehicle() {
            const vin = vinInput.value.trim().toUpperCase();
            const year = yearSelect.value;
            const engine = engineInput.value.trim();

            if (!vin || !year) {
                showNotification('Пожалуйста, заполните VIN и год выпуска', 'error');
                return;
            }

            if (vin.length !== 17) {
                showNotification('VIN должен содержать 17 символов', 'error');
                return;
            }

            disableForm(true);
            detectBtn.innerHTML = '⏳ Определение...';

            try {
                const prompt = `Проанализируй следующий автомобиль:
- VIN код: ${vin}
- Год выпуска: ${year}
- Объём двигателя: ${engine || 'не указан'}

Расшифруй VIN код и определи:
1. Марку автомобиля
2. Модель
3. Поколение/год выпуска
4. Тип кузова
5. Двигатель (объём, мощность, тип топлива)
6. Привод

Ответ дай в формате JSON:
{
  "make": "Марка",
  "model": "Модель",
  "generation": "Поколение",
  "bodyType": "Тип кузова",
  "engine": "Двигатель",
  "driveType": "Привод",
  "fullName": "Полное название автомобиля"
}

Если не можешь точно определить, укажи наиболее вероятный вариант.`;

                const response = await getAIResponse([
                    {
                        role: 'system',
                        content: 'Ты эксперт по расшифровке VIN кодов автомобилей. Отвечай точно и профессионально.'
                    },
                    {
                        role: 'user',
                        content: prompt
                    }
                ]);

                const content = response.choices[0]?.message?.content || '{}';
                
                // Try to parse JSON from response
                let vehicleData;
                try {
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        vehicleData = JSON.parse(jsonMatch[0]);
                    } else {
                        throw new Error('No JSON found');
                    }
                } catch (e) {
                    // Fallback: create object from text response
                    vehicleData = {
                        make: 'Не определено',
                        model: 'Не определено',
                        generation: year,
                        bodyType: 'Не определено',
                        engine: engine || 'Не указан',
                        driveType: 'Не определено',
                        fullName: `Автомобиль ${vin}`
                    };
                }

                currentVehicle = {
                    id: Date.now().toString(),
                    vin: vin,
                    year: year,
                    engine: engine,
                    ...vehicleData,
                    createdAt: new Date().toISOString()
                };

                displayCurrentVehicle(currentVehicle);
                initializeChat(currentVehicle);
                
                saveVehicleBtn.disabled = false;
                showNotification('Автомобиль успешно определён!', 'success');

            } catch (error) {
                console.error('Detection error:', error);
                showNotification(`Ошибка определения: ${error.message}`, 'error');
            } finally {
                disableForm(false);
                detectBtn.innerHTML = '🔍 Определить автомобиль';
            }
        }

        // Display current vehicle
        function displayCurrentVehicle(vehicle) {
            currentVehicleInfo.classList.remove('hidden');
            vehicleDetails.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Автомобиль</p>
                        <p style="font-weight: 600; font-size: 1.1rem;">${vehicle.fullName || `${vehicle.make} ${vehicle.model}`}</p>
                    </div>
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">VIN</p>
                        <p style="font-family: monospace; font-weight: 600;">${vehicle.vin}</p>
                    </div>
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Год выпуска</p>
                        <p style="font-weight: 600;">${vehicle.year}</p>
                    </div>
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Двигатель</p>
                        <p style="font-weight: 600;">${vehicle.engine || 'Не указан'}</p>
                    </div>
                    ${vehicle.bodyType ? `
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Кузов</p>
                        <p style="font-weight: 600;">${vehicle.bodyType}</p>
                    </div>
                    ` : ''}
                    ${vehicle.driveType ? `
                    <div>
                        <p style="color: var(--text-secondary); font-size: 0.9rem;">Привод</p>
                        <p style="font-weight: 600;">${vehicle.driveType}</p>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        // Initialize chat
        function initializeChat(vehicle) {
            chatContainer.classList.remove('hidden');
            chatHistory = [
                {
                    role: 'system',
                    content: SYSTEM_PROMPT
                },
                {
                    role: 'assistant',
                    content: `Здравствуйте! Я определил ваш автомобиль: **${vehicle.fullName || `${vehicle.make} ${vehicle.model}`}** (${vehicle.year} г.в., VIN: ${vehicle.vin}).\n\nКакая запчасть вас интересует? Напишите название детали, и я подберу для неё оригинальный номер и подходящие аналоги.`
                }
            ];

            renderChat();
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }

        // Render chat messages
        function renderChat() {
            chatMessages.innerHTML = '';
            
            chatHistory.forEach((message, index) => {
                if (message.role === 'system') return;
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message message-${message.role === 'user' ? 'user' : 'ai'}`;
                
                // Convert markdown-like formatting to HTML
                let content = message.content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>')
                    .replace(/• /g, '<li>')
                    .replace(/\n- /g, '\n<li>');
                
                // Wrap lists
                content = content.replace(/(<li>.*?(?:<br>|<\/li>))/gs, '<ul>$1</ul>');
                content = content.replace(/<\/ul><ul>/g, '');
                
                // Highlight part numbers
                content = content.replace(/([A-Z0-9]{8,15})/g, '<span class="part-number">$1</span>');

                messageDiv.innerHTML = `
                    <div class="message-content">${content}</div>
                `;
                
                chatMessages.appendChild(messageDiv);
            });

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send message to AI
        async function sendMessage() {
            const userMessage = chatInput.value.trim();
            if (!userMessage || isAITyping || !currentVehicle) return;

            // Add user message to history
            chatHistory.push({
                role: 'user',
                content: userMessage
            });

            chatInput.value = '';
            renderChat();
            isAITyping = true;
            chatInput.disabled = true;
            sendBtn.disabled = true;

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message message-ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Add vehicle context to the message
                const vehicleContext = `\nКонтекст автомобиля:\n- Марка: ${currentVehicle.make}\n- Модель: ${currentVehicle.model}\n- Год: ${currentVehicle.year}\n- VIN: ${currentVehicle.vin}\n- Двигатель: ${currentVehicle.engine || 'Не указан'}\n- Кузов: ${currentVehicle.bodyType || 'Не указан'}`;

                // Попытка отправки с перебором моделей при ошибке
                let stream = null;
                let lastError = null;
                
                for (let i = 0; i < MODELS.length; i++) {
                    const modelIndex = (currentModelIndex + i) % MODELS.length;
                    const currentModel = MODELS[modelIndex];
                    
                    try {
                        stream = await openrouter.chat.send({
                            model: currentModel,
                            messages: chatHistory.map(msg => ({
                                role: msg.role,
                                content: msg.role === 'user' ? msg.content + vehicleContext : msg.content
                            })),
                            stream: true
                        });
                        currentModelIndex = modelIndex; // Запоминаем рабочую модель
                        break;
                    } catch (modelError) {
                        lastError = modelError;
                        console.warn(`Модель ${currentModel} не ответила:`, modelError.message);
                        continue;
                    }
                }
                
                if (!stream) {
                    throw new Error(`Ни одна из моделей не ответила. Последняя ошибка: ${lastError?.message || 'Неизвестная ошибка'}`);
                }

                // Remove typing indicator
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }

                // Create AI message placeholder
                const aiMessageDiv = document.createElement('div');
                aiMessageDiv.className = 'message message-ai';
                aiMessageDiv.innerHTML = '<div class="message-content"></div>';
                chatMessages.appendChild(aiMessageDiv);

                const contentDiv = aiMessageDiv.querySelector('.message-content');
                let aiResponse = '';

                for await (const chunk of stream) {
                    const content = chunk.choices[0]?.delta?.content;
                    if (content) {
                        aiResponse += content;
                        // Update content with formatting
                        let formattedContent = aiResponse
                            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                            .replace(/\n/g, '<br>')
                            .replace(/• /g, '<li>')
                            .replace(/\n- /g, '\n<li>');
                        
                        formattedContent = formattedContent.replace(/(<li>.*?(?:<br>|<\/li>))/gs, '<ul>$1</ul>');
                        formattedContent = formattedContent.replace(/<\/ul><ul>/g, '');
                        formattedContent = formattedContent.replace(/([A-Z0-9]{8,15})/g, '<span class="part-number">$1</span>');
                        
                        contentDiv.innerHTML = formattedContent;
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    }
                }

                // Add AI response to history
                chatHistory.push({
                    role: 'assistant',
                    content: aiResponse
                });

            } catch (error) {
                console.error('Send message error:', error);
                showNotification(`Ошибка отправки сообщения: ${error.message}`, 'error');
                
                // Remove typing indicator
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
                
                // Add error message
                chatHistory.push({
                    role: 'assistant',
                    content: 'Извините, произошла ошибка при обработке вашего запроса. Пожалуйста, попробуйте ещё раз.'
                });
                renderChat();
            } finally {
                isAITyping = false;
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        // Clear chat
        function clearChat() {
            if (!currentVehicle) return;
            
            chatHistory = [
                {
                    role: 'system',
                    content: SYSTEM_PROMPT
                },
                {
                    role: 'assistant',
                    content: `Чат очищен. Ваш автомобиль: **${currentVehicle.fullName || `${currentVehicle.make} ${currentVehicle.model}`}** (${currentVehicle.year} г.в.).\n\nКакая запчасть вас интересует?`
                }
            ];
            
            renderChat();
            showNotification('Чат очищен', 'success');
        }

        // Save vehicle
        function saveVehicle() {
            if (!currentVehicle) return;

            // Check if already saved
            const existingIndex = savedVehicles.findIndex(v => v.vin === currentVehicle.vin);
            if (existingIndex !== -1) {
                savedVehicles[existingIndex] = currentVehicle;
            } else {
                savedVehicles.push(currentVehicle);
            }

            localStorage.setItem('savedVehicles', JSON.stringify(savedVehicles));
            localStorage.setItem('lastActiveVehicle', currentVehicle.id);
            
            renderSavedVehicles();
            showNotification('Автомобиль сохранён', 'success');
        }

        // Select vehicle from saved list
        function selectVehicle(vehicle) {
            currentVehicle = vehicle;
            
            // Fill form
            vinInput.value = vehicle.vin;
            yearSelect.value = vehicle.year;
            engineInput.value = vehicle.engine || '';
            
            displayCurrentVehicle(vehicle);
            initializeChat(vehicle);
            saveVehicleBtn.disabled = false;
            
            localStorage.setItem('lastActiveVehicle', vehicle.id);
            
            // Highlight selected vehicle
            document.querySelectorAll('.vehicle-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.id === vehicle.id) {
                    item.classList.add('active');
                }
            });
        }

        // Render saved vehicles
        function renderSavedVehicles() {
            if (savedVehicles.length === 0) {
                vehiclesGrid.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1/-1;">Нет сохранённых автомобилей</p>';
                return;
            }

            vehiclesGrid.innerHTML = '';
            savedVehicles.forEach(vehicle => {
                const vehicleItem = document.createElement('div');
                vehicleItem.className = `vehicle-item ${currentVehicle?.id === vehicle.id ? 'active' : ''}`;
                vehicleItem.dataset.id = vehicle.id;
                vehicleItem.innerHTML = `
                    <button class="delete-vehicle" data-id="${vehicle.id}">✕</button>
                    <div class="vehicle-info">
                        <h3>${vehicle.fullName || `${vehicle.make} ${vehicle.model}`}</h3>
                        <p><strong>VIN:</strong> ${vehicle.vin}</p>
                        <p><strong>Год:</strong> ${vehicle.year}</p>
                        <p><strong>Двигатель:</strong> ${vehicle.engine || 'Не указан'}</p>
                    </div>
                `;
                
                vehicleItem.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-vehicle')) {
                        selectVehicle(vehicle);
                    }
                });
                
                vehiclesGrid.appendChild(vehicleItem);
            });
        }

        // Delete vehicle
        function deleteVehicle(id, event) {
            event.stopPropagation();
            savedVehicles = savedVehicles.filter(v => v.id !== id);
            localStorage.setItem('savedVehicles', JSON.stringify(savedVehicles));
            
            if (currentVehicle?.id === id) {
                currentVehicle = null;
                currentVehicleInfo.classList.add('hidden');
                chatContainer.classList.add('hidden');
                saveVehicleBtn.disabled = true;
                localStorage.removeItem('lastActiveVehicle');
            }
            
            renderSavedVehicles();
            showNotification('Автомобиль удалён', 'success');
        }

        // Disable/Enable form
        function disableForm(disabled) {
            vinInput.disabled = disabled;
            yearSelect.disabled = disabled;
            engineInput.disabled = disabled;
            detectBtn.disabled = disabled;
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                info: '#6366f1'
            };

            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${colors[type]};
                color: white;
                padding: 15px 25px;
                border-radius: 12px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.3s ease;
                font-weight: 500;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Event Listeners
        detectBtn.addEventListener('click', detectVehicle);
        saveVehicleBtn.addEventListener('click', saveVehicle);
        sendBtn.addEventListener('click', sendMessage);
        clearChatBtn.addEventListener('click', clearChat);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isAITyping) {
                sendMessage();
            }
        });

        // Delegated event for delete buttons
        vehiclesGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-vehicle')) {
                deleteVehicle(e.target.dataset.id, e);
            }
        });

        // Initialize app
        init();
    </script>
</body>
</html>
